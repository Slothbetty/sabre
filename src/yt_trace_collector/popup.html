<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: sans-serif; width: 280px; padding: 14px; font-size: 13px; color: #333; }
    h2   { margin: 0 0 10px; font-size: 15px; color: #2c3e50; }
    .stat { background: #f8f9fa; border-radius: 6px; padding: 8px 12px; margin-bottom: 10px; }
    .stat strong { font-size: 22px; color: #2c3e50; }
    .stat span   { color: #7f8c8d; font-size: 11px; display: block; margin-top: 2px; }
    button {
      width: 100%; padding: 9px; border: none; border-radius: 4px;
      font-size: 13px; cursor: pointer; margin-bottom: 6px;
    }
    .btn-csv   { background: #27ae60; color: white; }
    .btn-csv:hover { background: #219a52; }
    .btn-clear { background: #e74c3c; color: white; }
    .btn-clear:hover { background: #c0392b; }
    .btn-csv:disabled, .btn-clear:disabled { background: #bdc3c7; cursor: not-allowed; }
    .msg { color: #27ae60; font-size: 12px; text-align: center; min-height: 16px; }
  </style>
</head>
<body>
  <h2>YouTube Trace Collector</h2>
  <div class="stat">
    <strong id="count">—</strong>
    <span>traces collected</span>
  </div>
  <button class="btn-csv"   id="exportBtn"  disabled>Export CSV</button>
  <button class="btn-clear" id="clearBtn"   disabled>Clear all traces</button>
  <div class="msg" id="msg"></div>
  <script src="popup.js"></script>
</body>
</html>
